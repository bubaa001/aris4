services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - ./media:/app/media
    restart: unless-stopped

  qcluster:
    build: .
    command: python manage.py qcluster
    env_file:
      - .env
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
    depends_on:
      - web
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    command: http web:8000 --url=${NGROK_URL:-crusader-easing-overlying.ngrok-free.dev}
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - web
    restart: unless-stopped

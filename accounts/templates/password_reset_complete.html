{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-6 py-16">
    <div class="w-full max-w-lg">
        <div class="border-t-4 border-black pt-6 mb-10">
            <span class="font-mono text-[10px] uppercase tracking-[0.3em] text-[#4f14e0] mb-3 block">Recovery</span>
            <h1 class="font-serif text-5xl md:text-6xl font-black tracking-tight text-black leading-none">Password Reset Complete</h1>
            <p class="font-mono text-xs text-gray-500 mt-3 uppercase tracking-wider">aris4.0 // password updated</p>
        </div>

        <div class="border border-gray-300 p-8 text-center">
            <p class="font-serif text-lg text-gray-700 leading-relaxed">
                Your password has been successfully reset.
            </p>
            <p class="font-mono text-xs text-gray-500 mt-4">
                You can now sign in with your new password.
            </p>
            <a href="{% url 'login' %}" class="inline-block mt-8 bg-black text-white font-mono text-xs font-bold tracking-widest uppercase px-8 py-4 hover:bg-[#4f14e0] transition-colors">
                Sign In
            </a>
        </div>
    </div>
</div>
{% endblock %}

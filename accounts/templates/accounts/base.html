<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLNportal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <!-- Navbar -->
    <nav class="bg-white shadow p-4 flex justify-between items-center">
        <a href="/" class="text-xl font-bold text-blue-600">OLNportal</a>
        <div>
            {% if user.is_authenticated %}
                <span class="mr-2">{{ user.username }}</span>
                <a href="#" class="text-red-500">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="text-blue-600 mr-4">Login</a>
                <a href="{% url 'register' %}" class="bg-blue-600 text-white px-4 py-2 rounded">Register</a>
            {% endif %}
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto mt-10 px-4">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
